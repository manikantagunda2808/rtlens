<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VLSI Review App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2e3148;
      border-radius: 12px;
      padding: 2.5rem;
      width: 380px;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #ffffff;
    }
    p.sub {
      font-size: 13px;
      color: #7a7f9a;
      margin-bottom: 1.8rem;
    }
    label {
      font-size: 12px;
      color: #9a9fb5;
      display: block;
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      background: #0f1117;
      border: 1px solid #2e3148;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      margin-bottom: 1rem;
      outline: none;
    }
    input:focus { border-color: #6c63ff; }
    button {
      width: 100%;
      padding: 11px;
      background: #6c63ff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
    }
    button:hover { background: #574fd6; }
    .error {
      font-size: 12px;
      color: #ff6b6b;
      margin-top: 8px;
      display: none;
    }
    .toggle {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 13px;
      color: #7a7f9a;
    }
    .toggle span {
      color: #6c63ff;
      cursor: pointer;
    }
    .chip {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      margin-right: 6px;
      cursor: pointer;
      border: 1px solid #2e3148;
      color: #9a9fb5;
    }
    .chip.active { background: #6c63ff; color: white; border-color: #6c63ff; }
    .chip-row { margin-bottom: 1rem; }
  </style>
</head>
<body>
<div class="card">
  <h1>⚡ VLSI Review</h1>
  <p class="sub">AI-powered code review for VLSI assignments</p>

  <!-- Login Form -->
  <div id="loginForm">
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="you@company.com">
    <label>Password</label>
    <input type="password" id="loginPassword" placeholder="••••••••">
    <button onclick="login()">Login</button>
    <div class="error" id="loginError">Invalid email or password</div>
    <div class="toggle">Don't have an account? <span onclick="showSignup()">Sign up</span></div>
  </div>

  <!-- Signup Form -->
  <div id="signupForm" style="display:none">
    <label>Full Name</label>
    <input type="text" id="signupName" placeholder="Your name">
    <label>Email</label>
    <input type="email" id="signupEmail" placeholder="you@company.com">
    <label>Password</label>
    <input type="password" id="signupPassword" placeholder="••••••••">
    <label>Role</label>
    <div class="chip-row">
      <span class="chip active" id="chipJunior" onclick="selectRole('junior')">Junior</span>
      <span class="chip" id="chipSenior" onclick="selectRole('senior')">Senior</span>
    </div>
    <button onclick="signup()">Create Account</button>
    <div class="error" id="signupError">Signup failed. Try again.</div>
    <div class="toggle">Already have an account? <span onclick="showLogin()">Login</span></div>
  </div>
</div>

<script>
  const API = "http://127.0.0.1:8000";
  let selectedRole = "junior";

  function selectRole(role) {
    selectedRole = role;
    document.getElementById("chipJunior").classList.toggle("active", role === "junior");
    document.getElementById("chipSenior").classList.toggle("active", role === "senior");
  }

  function showSignup() {
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("signupForm").style.display = "block";
  }

  function showLogin() {
    document.getElementById("signupForm").style.display = "none";
    document.getElementById("loginForm").style.display = "block";
  }

  async function login() {
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    const res = await fetch(`${API}/auth/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    if (res.ok) {
      const data = await res.json();
      localStorage.setItem("token", data.access_token);
      localStorage.setItem("name", data.name);
      localStorage.setItem("role", data.role);
      localStorage.setItem("user_id", data.user_id);

      if (data.role === "senior") {
        window.location.href = "/senior.html";
      } else {
        window.location.href = "/junior.html";
      }
    } else {
      document.getElementById("loginError").style.display = "block";
    }
  }

  async function signup() {
    const name = document.getElementById("signupName").value;
    const email = document.getElementById("signupEmail").value;
    const password = document.getElementById("signupPassword").value;

    const res = await fetch(`${API}/auth/signup`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password, name, role: selectedRole })
    });

    if (res.ok) {
      alert("Account created! Please login.");
      showLogin();
    } else {
      document.getElementById("signupError").style.display = "block";
    }
  }
</script>
</body>
</html>
